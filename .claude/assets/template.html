<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__TITLE__</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --accent-dim: #1f6feb33;
    --green: #3fb950;
    --orange: #d29922;
    --red: #f85149;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 2rem;
    max-width: 900px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.8rem;
    margin-bottom: 0.25rem;
    color: var(--text);
  }
  .subtitle {
    color: var(--text-muted);
    font-size: 0.95rem;
    margin-bottom: 2rem;
  }
  h2 {
    font-size: 1.3rem;
    color: var(--accent);
    margin-top: 2rem;
    margin-bottom: 1rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
  }
  .post {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
  }
  .post-header {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 0.5rem;
    margin-bottom: 0.25rem;
  }
  .post-title {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text);
  }
  .post-original {
    font-size: 0.82rem;
    color: var(--text-muted);
  }
  .post-meta {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-bottom: 0.75rem;
  }
  .badge {
    display: inline-block;
    font-size: 0.75rem;
    padding: 0.1rem 0.45rem;
    border-radius: 4px;
    font-weight: 600;
  }
  .badge-pts {
    background: var(--accent-dim);
    color: var(--accent);
  }
  .badge-cmt {
    background: #30363d;
    color: var(--text-muted);
  }
  details {
    margin-top: 0.5rem;
  }
  summary {
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--accent);
    font-weight: 500;
    padding: 0.3rem 0;
    user-select: none;
  }
  summary:hover {
    text-decoration: underline;
  }
  .content-bullets {
    margin: 0.5rem 0 0.5rem 1.25rem;
    font-size: 0.9rem;
  }
  .content-bullets li {
    margin-bottom: 0.35rem;
    color: var(--text);
  }
  .discussion-header {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 0.75rem;
    margin-bottom: 0.25rem;
  }
  .discussion-header a {
    color: var(--accent);
    text-decoration: none;
  }
  .discussion-header a:hover {
    text-decoration: underline;
  }
  .discussion-bullets {
    margin: 0.25rem 0 0 1.25rem;
    font-size: 0.88rem;
  }
  .discussion-bullets li {
    margin-bottom: 0.3rem;
    color: var(--text-muted);
  }
  .themes {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem;
    margin-top: 2rem;
  }
  .themes h2 {
    margin-top: 0;
    border: none;
    padding: 0;
    margin-bottom: 0.75rem;
  }
  .themes li {
    margin-bottom: 0.4rem;
    margin-left: 1.25rem;
    font-size: 0.95rem;
  }
  .generated {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.8rem;
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }
  @media (max-width: 600px) {
    body { padding: 1rem; }
    h1 { font-size: 1.4rem; }
    .post { padding: 0.75rem 1rem; }
  }
</style>
</head>
<body>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__TITLE__</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: Verdana, Geneva, sans-serif;
    font-size: 10pt;
    background-color: #f6f6ef;
    color: #000;
  }

  /* ── Top bar ─────────────────────────────────────────── */
  #hnbar {
    background-color: #ff6600;
    padding: 2px 6px;
    display: flex;
    align-items: center;
    gap: 6px;
    line-height: 18px;
  }
  #hnbar .logo {
    display: inline-block;
    background: white;
    color: #ff6600;
    font-weight: bold;
    font-size: 11pt;
    width: 18px;
    height: 18px;
    text-align: center;
    line-height: 18px;
    border: 1px solid #ff6600;
    flex-shrink: 0;
    text-decoration: none;
  }
  #hnbar .sitename {
    color: white;
    font-weight: bold;
    font-size: 10pt;
    text-decoration: none;
  }
  #hnbar .pagetitle {
    color: white;
    font-size: 10pt;
  }
  #hnbar .sep { color: rgba(255,255,255,0.6); }

  /* ── Content area ────────────────────────────────────── */
  #wrap {
    max-width: 860px;
    margin: 0 auto;
    padding: 8px 12px 24px;
  }

  /* ── Category headers ────────────────────────────────── */
  .category-header {
    background-color: #ff6600;
    color: white;
    font-size: 8pt;
    font-weight: bold;
    padding: 2px 6px;
    margin-top: 18px;
    margin-bottom: 2px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* ── Post rows ───────────────────────────────────────── */
  .item {
    padding: 5px 0 3px 0;
    border-bottom: 1px solid #e8e8e0;
  }

  .item-title-row {
    display: flex;
    align-items: baseline;
    gap: 5px;
  }
  .rank {
    color: #828282;
    font-size: 8.5pt;
    min-width: 22px;
    text-align: right;
    flex-shrink: 0;
  }
  .item-title {
    font-size: 10pt;
    color: #000;
  }
  .source-domain {
    font-size: 7.5pt;
    color: #828282;
  }

  .item-meta {
    padding-left: 28px;
    font-size: 7pt;
    color: #828282;
    margin-top: 1px;
  }
  .item-meta .pts { font-weight: bold; color: #555; }
  .item-meta .orig-title {
    font-style: italic;
    color: #999;
  }

  /* ── Collapsible details ─────────────────────────────── */
  details {
    padding-left: 28px;
    margin-top: 3px;
  }
  summary {
    cursor: pointer;
    font-size: 7.5pt;
    color: #ff6600;
    user-select: none;
    list-style: none;
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }
  summary::-webkit-details-marker { display: none; }
  summary::before { content: "▶"; font-size: 6pt; }
  details[open] > summary::before { content: "▼"; }
  summary:hover { text-decoration: underline; }

  .content-bullets {
    margin: 5px 0 5px 14px;
    font-size: 9pt;
    color: #333;
    line-height: 1.5;
  }
  .content-bullets li { margin-bottom: 3px; }

  .disc-header {
    font-size: 7.5pt;
    color: #828282;
    margin-top: 8px;
  }
  .disc-header a { color: #ff6600; text-decoration: none; }
  .disc-header a:hover { text-decoration: underline; }

  .discussion-bullets {
    margin: 4px 0 6px 14px;
    font-size: 8.5pt;
    color: #666;
    line-height: 1.5;
  }
  .discussion-bullets li { margin-bottom: 3px; }

  /* ── Key Themes ──────────────────────────────────────── */
  .themes {
    margin-top: 22px;
    border: 1px solid #e0e0d8;
    background: #fffdf5;
    padding: 10px 14px;
  }
  .themes-title {
    font-size: 8pt;
    font-weight: bold;
    color: #ff6600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 7px;
  }
  .themes ul {
    margin-left: 14px;
    font-size: 9pt;
    color: #333;
    line-height: 1.5;
  }
  .themes li { margin-bottom: 4px; }

  /* ── Footer ──────────────────────────────────────────── */
  #footer {
    text-align: center;
    color: #828282;
    font-size: 7.5pt;
    margin-top: 20px;
    padding-top: 10px;
    border-top: 1px solid #e0e0d8;
  }
</style>
</head>
<body>

<div id="hnbar">
  <a class="logo" href="index.html">Y</a>
  <a class="sitename" href="index.html">AI HN Digest</a>
  <span class="sep">|</span>
  <span class="pagetitle">__TITLE__</span>
</div>

<div id="wrap">

<div id="footer">
  Generated with Claude Code &mdash; __GENERATED_AT__
</div>

</div>
</body>
</html>

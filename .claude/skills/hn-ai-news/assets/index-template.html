<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI HN Digest — Archive</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: Verdana, Geneva, sans-serif;
    font-size: 10pt;
    background-color: #f6f6ef;
    color: #000;
  }

  #hnbar {
    background-color: #ff6600;
    padding: 2px 6px;
    display: flex;
    align-items: center;
    gap: 6px;
    line-height: 18px;
  }
  #hnbar .logo {
    display: inline-block;
    background: white;
    color: #ff6600;
    font-weight: bold;
    font-size: 11pt;
    width: 18px;
    height: 18px;
    text-align: center;
    line-height: 18px;
    border: 1px solid #ff6600;
    flex-shrink: 0;
    text-decoration: none;
  }
  #hnbar .sitename {
    color: white;
    font-weight: bold;
    font-size: 10pt;
    text-decoration: none;
  }
  #hnbar .pagetitle {
    color: white;
    font-size: 10pt;
  }
  #hnbar .sep { color: rgba(255,255,255,0.6); }

  #wrap {
    max-width: 860px;
    margin: 0 auto;
    padding: 12px;
  }

  .section-header {
    font-size: 8pt;
    font-weight: bold;
    color: #828282;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 16px 0 6px 0;
    padding-bottom: 3px;
    border-bottom: 1px solid #e0e0d8;
  }

  .entry {
    display: flex;
    align-items: baseline;
    gap: 6px;
    padding: 5px 0 4px 0;
    border-bottom: 1px solid #e8e8e0;
  }
  .entry-rank {
    color: #828282;
    font-size: 8.5pt;
    min-width: 22px;
    text-align: right;
    flex-shrink: 0;
  }
  .entry-link {
    font-size: 10pt;
    color: #000;
    text-decoration: none;
  }
  .entry-link:hover { text-decoration: underline; }
  .entry-meta {
    font-size: 7.5pt;
    color: #828282;
    margin-left: 4px;
  }

  #footer {
    text-align: center;
    color: #828282;
    font-size: 7.5pt;
    margin-top: 20px;
    padding-top: 10px;
    border-top: 1px solid #e0e0d8;
  }
</style>
</head>
<body>

<div id="hnbar">
  <span class="logo">Y</span>
  <span class="sitename">AI HN Digest</span>
  <span class="sep">|</span>
  <span class="pagetitle">Archive</span>
</div>

<div id="wrap">

<div class="section-header">Daily AI digests — latest first</div>

__ENTRIES__

<div id="footer">Generated with Claude Code &mdash; __GENERATED_AT__</div>

</div>
</body>
</html>
